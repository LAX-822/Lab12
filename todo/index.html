<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>
<body style="font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px;">

    <h1>📝 Todo App</h1>

    <div>
        <input type="text" id="todo-input" placeholder="Add a new task..."
               style="width: 70%; padding: 8px; font-size: 16px;">
        <button onclick="addTodo()"
                style="padding: 8px 16px; font-size: 16px;">Add</button>
    </div>

    <ul id="todo-list" style="list-style: none; padding: 0; margin-top: 20px;"></ul>

    <script>
        const todos = JSON.parse(localStorage.getItem('todos') || '[]');

        function render() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, i) => {
                const li = document.createElement('li');
                li.style.cssText = 'display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee;';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = todo.done;
                checkbox.onclick = () => toggleTodo(i);

                const text = document.createElement('span');
                text.textContent = todo.text;
                if (todo.done) text.style.textDecoration = 'line-through';

                const del = document.createElement('button');
                del.textContent = '✕';
                del.style.marginLeft = 'auto';
                del.onclick = () => deleteTodo(i);

                li.appendChild(checkbox);
                li.appendChild(text);
                li.appendChild(del);
                list.appendChild(li);
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;
            todos.push({ text, done: false });
            localStorage.setItem('todos', JSON.stringify(todos));
            input.value = '';
            render();
        }

        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            localStorage.setItem('todos', JSON.stringify(todos));
            render();
        }

        function deleteTodo(i) {
            todos.splice(i, 1);
            localStorage.setItem('todos', JSON.stringify(todos));
            render();
        }

        render();
    </script>

</body>
</html>
